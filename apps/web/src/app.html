<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- favicon/manifest injected by root layout with cache-busting -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <script>
      const theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.classList.toggle('light', theme === 'light');
    </script>
    <script>
      // Diagnostic trap: captures JS errors, navigations, and DOM clearing.
      (function() {
        var events = [];
        var t0 = Date.now();
        function ts() { return (Date.now() - t0) + 'ms'; }
        function log(msg) { events.push(ts() + ' ' + msg); }

        window.addEventListener('error', function(e) {
          log('[error] ' + (e.message || '') + ' at ' + (e.filename || '?') + ':' + e.lineno + (e.error && e.error.stack ? '\n' + e.error.stack : ''));
        });
        window.addEventListener('unhandledrejection', function(e) {
          var msg = e.reason instanceof Error ? e.reason.message : String(e.reason);
          var stack = e.reason instanceof Error ? e.reason.stack : '';
          log('[rejection] ' + msg + (stack ? '\n' + stack : ''));
        });

        // Track navigations
        var origPushState = history.pushState;
        var origReplaceState = history.replaceState;
        history.pushState = function() {
          log('[nav:pushState] ' + arguments[2]);
          return origPushState.apply(this, arguments);
        };
        history.replaceState = function() {
          log('[nav:replaceState] ' + arguments[2]);
          return origReplaceState.apply(this, arguments);
        };
        window.addEventListener('popstate', function() { log('[nav:popstate] ' + location.href); });

        // Track fetch failures
        var origFetch = window.fetch;
        window.fetch = function(url) {
          var urlStr = typeof url === 'string' ? url : (url && url.url ? url.url : '?');
          return origFetch.apply(this, arguments).then(function(res) {
            if (!res.ok) log('[fetch:' + res.status + '] ' + urlStr.slice(0, 200));
            return res;
          }, function(err) {
            log('[fetch:fail] ' + urlStr.slice(0, 200) + ' ' + (err.message || ''));
            throw err;
          });
        };

        // Watch for DOM clearing
        var hadContent = false;
        var shown = false;
        var observer = new MutationObserver(function() {
          if (shown) return;
          var container = document.querySelector('body > div[style*="contents"]');
          if (!container) return;
          if (container.children.length > 0) {
            if (!hadContent) { hadContent = true; log('[dom] content appeared'); }
          }
          if (hadContent && container.children.length === 0) {
            log('[dom] content cleared!');
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // After 4 seconds, if main-content is empty, show diagnostics
        setTimeout(function() {
          var main = document.getElementById('main-content');
          var hasVisible = main && main.children.length > 0 && main.offsetHeight > 50;
          if (!hasVisible && events.length > 0) {
            shown = true;
            showDiag();
          }
        }, 4000);

        function sendReport() {
          var payload = {
            message: 'Page blank diagnostics (' + events.length + ' events)',
            url: window.location.href,
            errors: events.map(function(e) { return { type: 'diagnostic', message: e, stack: '' }; })
          };
          try {
            navigator.sendBeacon(
              'https://api.humans.pavinfo.app/api/client-errors',
              new Blob([JSON.stringify(payload)], { type: 'application/json' })
            );
          } catch (_) {}
        }
        function showDiag() {
          sendReport();
          var div = document.createElement('div');
          div.id = '__error_trap__';
          div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#0a0a1a;color:#88bbff;font-family:monospace;font-size:13px;padding:24px;overflow:auto;';
          var title = document.createElement('h2');
          title.style.cssText = 'color:#66aaff;margin:0 0 8px';
          title.textContent = 'Page diagnostics — ' + events.length + ' events captured';
          div.appendChild(title);
          var sub = document.createElement('p');
          sub.style.cssText = 'color:#8899aa;margin:0 0 16px;font-size:11px';
          sub.textContent = window.location.href;
          div.appendChild(sub);
          var pre = document.createElement('pre');
          pre.style.cssText = 'background:#111122;border:1px solid #334;border-radius:6px;padding:12px;white-space:pre-wrap;word-break:break-all;color:#aaccee;font-size:12px;';
          pre.textContent = events.join('\n').slice(0, 8000);
          div.appendChild(pre);
          document.documentElement.appendChild(div);
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
